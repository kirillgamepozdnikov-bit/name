<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
            font-size: 20px;
            z-index: 9998;
            pointer-events: none;
            animation: fadeOut 0.8s forwards 2s;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        /* Скрытый аудио-контекст для принудительной громкости */
        #audioCtx {
            display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">🎵 ЗАГРУЗКА...</div>

    <iframe id="player"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&playlist=dQw4w9WgXcQ&controls=0&modestbranding=1&rel=0&fs=0"
        allow="autoplay; fullscreen; encrypted-media; accelerometer; gyroscope"
        allowfullscreen>
    </iframe>

    <!-- Скрытый аудиоэлемент для разблокировки звука -->
    <audio id="unlockAudio" src="data:audio/wav;base64,U1GRlZAAAA..."></audio>

    <script>
        (function() {
            const iframe = document.getElementById('player');
            let soundUnlocked = false;

            // 1. Функция принудительной разблокировки звука
            function unlockSound() {
                if (soundUnlocked) return;

                // Создаём аудиоконтекст (разблокирует звук на Android)
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }

                // Пытаемся найти video внутри iframe
                try {
                    const video = document.querySelector('video');
                    if (video) {
                        video.muted = false;
                        video.volume = 1.0;
                        video.play();
                        soundUnlocked = true;
                    }
                } catch (e) {}

                // Перезагружаем iframe с autoplay и без mute
                if (!soundUnlocked) {
                    iframe.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&loop=1&playlist=dQw4w9WgXcQ&controls=0&modestbranding=1&rel=0&fs=0';
                    soundUnlocked = true;
                }

                // Громкость на 100% через виртуальное нажатие
                setTimeout(() => {
                    try {
                        const video = document.querySelector('video');
                        if (video) {
                            video.volume = 1.0;
                            video.muted = false;
                        }
                    } catch (e) {}
                }, 300);
            }

            // 2. Попытка разблокировать звук при загрузке
            window.addEventListener('load', function() {
                setTimeout(unlockSound, 500);
            });

            // 3. Если не сработало — пробуем ещё через 1 секунду
            setTimeout(unlockSound, 1500);

            // 4. При любом касании экрана — включаем звук (тихо, без кнопки)
            document.addEventListener('click', unlockSound);
            document.addEventListener('touchstart', unlockSound);

            // 5. Постоянно держим громкость на 100%
            setInterval(function() {
                try {
                    const video = document.querySelector('video');
                    if (video) {
                        video.volume = 1.0;
                        video.muted = false;
                    }
                } catch (e) {}
            }, 300);

            // 6. На весь экран
            setTimeout(function() {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }, 500);

            // 7. Блокировка "Назад"
            window.history.pushState(null, null, window.location.href);
            window.addEventListener('popstate', function() {
                window.history.pushState(null, null, window.location.href);
            });

            // 8. Вибрация
            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 600]);
            }

            // 9. Если вкладка скрыта — при возврате снова пытаемся включить звук
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    unlockSound();
                }
            });

        })();
    </script>

</body>
</html>
